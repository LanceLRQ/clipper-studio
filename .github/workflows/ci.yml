name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clipper-studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: clipper-studio/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clipper-studio/src-tauri -> target

      - name: Install Linux webkit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: ESLint (soft)
        run: pnpm lint
        continue-on-error: true

      - name: Rust fmt check
        working-directory: clipper-studio/src-tauri
        run: cargo fmt --all -- --check

      - name: Rust clippy (soft)
        working-directory: clipper-studio/src-tauri
        run: cargo clippy --features builtin-plugins --all-targets
        continue-on-error: true

      - name: Rust test
        working-directory: clipper-studio/src-tauri
        run: cargo test --features builtin-plugins --all-targets
